<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Greenfeld Ad Showcase</title>
    <style>
      :root {
        --brand: #1f3845;
        --accent: #378da7;
      }

      @font-face {
        font-family: "Chopin Trial";
        src: url("assets/fonts/chopin-trial-regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Chopin Trial";
        src: url("assets/fonts/chopin-trial-semibold.otf") format("opentype");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #ffffff;
        color: var(--brand);
        font-family: "Chopin Trial", "Chopin-Trial", sans-serif;
      }

      .showcase-header {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 2;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 34px clamp(24px, 8vw, 170px);
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(14px);
      }

      .showcase-title {
        margin: 0;
        color: var(--accent);
        font-size: clamp(26px, 2.2vw, 42px);
        font-weight: 600;
      }

      .back-link {
        color: var(--brand);
        font-size: clamp(17px, 1.2vw, 23px);
        text-decoration: none;
        transition: color 180ms ease;
      }

      .back-link:hover,
      .back-link:focus-visible {
        color: var(--accent);
      }

      .showcase-main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 140px clamp(20px, 5vw, 80px) 70px;
      }

      .showcase-frame {
        width: min(100%, 1500px);
        border-radius: 8px;
        box-shadow: 0 30px 90px rgba(17, 35, 43, 0.12);
        overflow: hidden;
      }

      .showcase-frame object {
        display: block;
        width: 100%;
        aspect-ratio: 804.173 / 417.237;
        border: 0;
      }
    </style>
  </head>
  <body>
    <header class="showcase-header">
      <h1 class="showcase-title">Ad Showcase</h1>
      <a class="back-link" href="index.html#work">Back</a>
    </header>

    <main class="showcase-main">
      <div class="showcase-frame">
        <object data="assets/greenfeld-uw.svg" type="image/svg+xml" aria-label="Greenfeld ad showcase"></object>
      </div>
    </main>
  </body>
</html>
